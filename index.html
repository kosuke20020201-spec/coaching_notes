<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f785f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Session OS">
  <title>Session OS | レッスンメモ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=20260706-type-scoped-folders">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">S</span>
        <span>Session OS</span>
      </div>

      <div class="header-actions">
        <label class="search-box" aria-label="検索">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4-4"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="検索">
        </label>
        <button id="newNoteButton" class="button primary" type="button">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          <span>新規メモ</span>
        </button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar" aria-label="メモ一覧">
        <nav class="type-tabs" aria-label="メモ種別">
          <button class="type-tab active" type="button" data-filter="all">すべて</button>
          <button class="type-tab" type="button" data-filter="gym">ジム</button>
          <button class="type-tab" type="button" data-filter="vocal">ボイトレ</button>
          <button class="type-tab" type="button" data-filter="cross">横断</button>
        </nav>

        <section class="tag-folder-panel" aria-label="タグフォルダ">
          <div class="folder-panel-head">
            <div class="tag-folder-title">タグフォルダ</div>
            <button id="addFolderButton" class="icon-button" type="button" aria-label="新規フォルダ">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14"></path>
              </svg>
            </button>
          </div>
          <div class="tag-folder-list" id="tagFolderList"></div>
        </section>

        <section class="folder-tag-panel" aria-label="フォルダ内のタグ">
          <div class="folder-tag-title" id="folderTagTitle">フォルダ内のタグ</div>
          <div class="folder-editor-panel" id="folderEditor"></div>
          <div class="folder-tag-list" id="tagFilterList"></div>
        </section>

        <div class="list-head">
          <h1>レッスンメモ</h1>
          <span id="noteCount">0</span>
        </div>

        <div class="note-list" id="noteList"></div>
      </aside>

      <section class="editor" aria-labelledby="titleLabel">
        <div class="editor-top">
          <div class="type-picker" role="group" aria-label="このメモの種別">
            <button class="type-choice active" type="button" data-note-type="gym">ジム</button>
            <button class="type-choice" type="button" data-note-type="vocal">ボイトレ</button>
            <button class="type-choice" type="button" data-note-type="cross">横断</button>
          </div>

          <div class="editor-actions">
            <label class="date-field">
              <span>日付</span>
              <input id="dateInput" type="date">
            </label>
            <button id="deleteButton" class="button danger" type="button">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v5M14 11v5"></path>
              </svg>
              <span>削除</span>
            </button>
            <button id="saveButton" class="button primary" type="button">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
                <path d="M17 21v-8H7v8M7 3v5h8"></path>
              </svg>
              <span>保存</span>
            </button>
          </div>
        </div>

        <label class="title-field">
          <span id="titleLabel">タイトル</span>
          <input id="titleInput" type="text" placeholder="例: 下半身と体幹">
        </label>

        <label class="memo-field">
          <span>見返したいこと</span>
          <textarea id="bodyInput" placeholder="あとで読んで「そうやったわ」と思えることだけ。&#10;例: スクワットはしゃがむ前に息を入れる。足裏三点で押す。右膝が内に入りやすい。"></textarea>
        </label>

        <label class="tag-field">
          <span>タグ</span>
          <input id="tagsInput" type="text" placeholder="例: 胸, ベンチ, プレス">
        </label>

        <div class="status-line">
          <span id="updatedText">未保存</span>
        </div>
      </section>
    </main>
  </div>

  <div class="confirm-overlay" id="deleteDialog" aria-hidden="true">
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle">
      <h2 id="deleteDialogTitle">メモを削除しますか？</h2>
      <p id="deleteDialogText">このメモを削除します。</p>
      <div class="confirm-actions">
        <button id="cancelDeleteButton" class="button ghost" type="button">キャンセル</button>
        <button id="confirmDeleteButton" class="button danger solid" type="button">削除する</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">保存しました</div>
  <script src="app.js?v=20260706-type-scoped-folders"></script>
</body>
</html>
